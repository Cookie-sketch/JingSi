<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>一念靜籤｜電子版靜思語風格抽籤</title>
  <style>
    :root {
      --bg1: #f8f4ec;
      --bg2: #e9dfce;
      --ink: #2b2723;
      --muted: #756b5e;
      --gold: #b88746;
      --gold2: #e8c58b;
      --paper: rgba(255, 252, 245, .82);
      --line: rgba(184, 135, 70, .22);
      --shadow: 0 26px 70px rgba(71, 54, 34, .16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: ui-serif, "Noto Serif TC", "Songti TC", "PMingLiU", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 245, 218, .92), transparent 30rem),
        radial-gradient(circle at 18% 85%, rgba(229, 198, 146, .28), transparent 24rem),
        linear-gradient(145deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(140, 104, 60, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(140, 104, 60, .035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 0 38%, transparent 78%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      position: relative;
    }

    .altar {
      width: min(920px, 100%);
      display: grid;
      gap: 20px;
      justify-items: center;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: 8px;
      user-select: none;
    }

    .seal {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(184, 135, 70, .45);
      background: radial-gradient(circle at 35% 30%, #fffdf7, #ead2a5);
      box-shadow: 0 10px 28px rgba(116, 76, 30, .14);
      color: #8d5b22;
      font-size: 24px;
      letter-spacing: .08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 56px);
      font-weight: 500;
      letter-spacing: .14em;
      text-indent: .14em;
    }

    .subtitle {
      margin: 0;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: .22em;
      text-indent: .22em;
    }

    .card {
      width: min(760px, 100%);
      min-height: 350px;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.62), rgba(255,252,244,.76)),
        var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: clamp(28px, 5vw, 54px);
      overflow: hidden;
      display: grid;
      align-content: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 24px;
      border: 1px solid rgba(184, 135, 70, .16);
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -92px;
      top: -94px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,197,139,.38), transparent 68%);
      pointer-events: none;
    }

    .ritual-line {
      width: 1px;
      height: 42px;
      background: linear-gradient(transparent, rgba(184,135,70,.48), transparent);
      margin: 0 auto 18px;
      transform-origin: center top;
      animation: breathe 3.8s ease-in-out infinite;
    }

    .quote {
      position: relative;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: clamp(25px, 4.5vw, 43px);
      line-height: 1.78;
      letter-spacing: .06em;
      text-wrap: balance;
      opacity: 1;
      transform: translateY(0);
      transition: opacity .55s ease, transform .55s ease, filter .55s ease;
    }

    .quote.changing {
      opacity: 0;
      transform: translateY(12px);
      filter: blur(4px);
    }

    .meta {
      position: relative;
      z-index: 1;
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .16em;
      text-indent: .16em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 15px 25px;
      cursor: pointer;
      font: 500 16px/1 ui-serif, "Noto Serif TC", "Songti TC", serif;
      letter-spacing: .16em;
      text-indent: .16em;
      color: #fffaf0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.20), transparent),
        linear-gradient(135deg, #9d6d33, #c99a56);
      box-shadow: 0 14px 34px rgba(126, 83, 34, .22);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(126, 83, 34, .27);
    }

    button:active {
      transform: translateY(0) scale(.98);
      filter: brightness(.98);
    }

    .ghost {
      background: rgba(255, 252, 245, .62);
      color: #7b582f;
      border: 1px solid rgba(184,135,70,.23);
      box-shadow: none;
    }

    .lotus {
      position: absolute;
      inset: auto 0 22px;
      display: flex;
      justify-content: center;
      gap: 9px;
      opacity: .42;
      pointer-events: none;
    }

    .petal {
      width: 28px;
      height: 44px;
      border-radius: 70% 70% 52% 52%;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(232,197,139,.40));
      border: 1px solid rgba(184,135,70,.14);
      transform-origin: bottom center;
    }

    .petal:nth-child(1) { transform: rotate(-34deg) translateY(10px); }
    .petal:nth-child(2) { transform: rotate(-14deg) translateY(2px); }
    .petal:nth-child(3) { transform: rotate(0deg) translateY(-4px); }
    .petal:nth-child(4) { transform: rotate(14deg) translateY(2px); }
    .petal:nth-child(5) { transform: rotate(34deg) translateY(10px); }

    .history {
      width: min(760px, 100%);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
      text-align: center;
      min-height: 28px;
    }

    .history strong {
      color: #7b582f;
      font-weight: 500;
    }

    .spark {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(184,135,70,.35);
      animation: floatUp 1.2s ease-out forwards;
      box-shadow: 0 0 18px rgba(232,197,139,.7);
    }


    .footer-credit {
      margin-top: 10px;
      color: rgba(117, 107, 94, .86);
      font-size: 13px;
      letter-spacing: .12em;
      text-indent: .12em;
      text-align: center;
      user-select: none;
    }

    @keyframes breathe {
      0%, 100% { transform: scaleY(.72); opacity: .45; }
      50% { transform: scaleY(1.22); opacity: .95; }
    }

    @keyframes floatUp {
      to {
        transform: translateY(-90px) scale(0);
        opacity: 0;
      }
    }

    @media (max-width: 560px) {
      main { padding: 22px 14px; }
      .card { min-height: 430px; border-radius: 28px; }
      .controls { width: 100%; }
      button { width: min(100%, 320px); }
      .subtitle { font-size: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

    const quoteEl = document.getElementById("quote");
    const metaEl = document.getElementById("meta");
    const historyEl = document.getElementById("history");
    const drawBtn = document.getElementById("drawBtn");
    const copyBtn = document.getElementById("copyBtn");

    let lastIndex = Number(localStorage.getItem("quietQuoteIndex") ?? -1);
    let drawCount = Number(localStorage.getItem("quietQuoteDrawCount") ?? 0);

    function pickQuote() {
      if (quotes.length <= 1) return 0;
      let index;
      do {
        index = Math.floor(Math.random() * quotes.length);
      } while (index === lastIndex);
      return index;
    }

    function makeSparks() {
      const rect = drawBtn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      for (let i = 0; i < 14; i++) {
        const spark = document.createElement("span");
        spark.className = "spark";
        const angle = (Math.PI * 2 * i) / 14;
        const radius = 24 + Math.random() * 34;
        spark.style.left = `${cx + Math.cos(angle) * radius}px`;
        spark.style.top = `${cy + Math.sin(angle) * radius}px`;
        spark.style.animationDelay = `${Math.random() * .12}s`;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 1400);
      }
    }

    function draw() {
      drawBtn.disabled = true;
      drawBtn.textContent = "靜心中…";
      quoteEl.classList.add("changing");
      makeSparks();

      setTimeout(() => {
        const index = pickQuote();
        lastIndex = index;
        drawCount += 1;
        localStorage.setItem("quietQuoteIndex", String(index));
        localStorage.setItem("quietQuoteDrawCount", String(drawCount));

        quoteEl.textContent = quotes[index];
        metaEl.textContent = `第 ${index + 1} 籤・第 ${drawCount} 次相遇`;
        historyEl.innerHTML = `請把這一句帶走：<strong>${quotes[index].slice(0, 14)}…</strong>`;
        quoteEl.classList.remove("changing");
        drawBtn.disabled = false;
        drawBtn.textContent = "靜心抽一句";
      }, 760);
    }

    async function copyQuote() {
      const text = quoteEl.textContent.trim();
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "已複製";
        setTimeout(() => copyBtn.textContent = "複製此句", 1200);
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        copyBtn.textContent = "已複製";
        setTimeout(() => copyBtn.textContent = "複製此句", 1200);
      }
    }

    drawBtn.addEventListener("click", draw);
    copyBtn.addEventListener("click", copyQuote);

    if (lastIndex >= 0 && quotes[lastIndex]) {
      quoteEl.textContent = quotes[lastIndex];
      metaEl.textContent = `上次相遇・第 ${lastIndex + 1} 籤`;
    }
